<?xml version="1.0" encoding="UTF-8"?>
<!--
  Vivaldi PWA Manager — app icon.
  Vivaldi-style red rounded square + bold "PWA" + small gear badge.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F44848"/>
      <stop offset="1" stop-color="#D8302E"/>
    </linearGradient>
  </defs>

  <!-- Vivaldi-red rounded square -->
  <rect x="12" y="12" width="232" height="232" rx="52" ry="52" fill="url(#bg)"/>

  <!-- PWA text -->
  <text x="128" y="158"
        text-anchor="middle"
        font-family="DejaVu Sans, Arial, sans-serif"
        font-weight="900"
        font-size="84"
        letter-spacing="-2"
        fill="white">PWA</text>

  <!-- Gear badge, bottom-right corner. Drawn as a single concentric set of
       rectangles + rotated copy, so it works in any SVG renderer without
       relying on extra filters. -->
  <g transform="translate(202,202) scale(0.9)">
    <!-- Outer cog teeth: 4 cardinal + 4 diagonals -->
    <g fill="white">
      <rect x="-6" y="-34" width="12" height="14" rx="2"/>
      <rect x="-6" y="20"  width="12" height="14" rx="2"/>
      <rect x="-34" y="-6" width="14" height="12" rx="2"/>
      <rect x="20"  y="-6" width="14" height="12" rx="2"/>
      <g transform="rotate(45)">
        <rect x="-6" y="-34" width="12" height="14" rx="2"/>
        <rect x="-6" y="20"  width="12" height="14" rx="2"/>
        <rect x="-34" y="-6" width="14" height="12" rx="2"/>
        <rect x="20"  y="-6" width="14" height="12" rx="2"/>
      </g>
    </g>
    <!-- Gear body -->
    <circle r="24" fill="white"/>
    <!-- Center hole, lets the red show through -->
    <circle r="9" fill="#D8302E"/>
  </g>
</svg>
